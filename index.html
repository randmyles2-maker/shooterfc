<!DOCTYPE html>
<html>
<head>
    <title>Simulator Launcher</title>
    <style>
        body { 
            background-color: #1a1a1a; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: sans-serif; 
        }
        .launch-btn { 
            padding: 20px 40px; 
            font-size: 24px; 
            cursor: pointer; 
            background: #ffffff; 
            color: #000; 
            border: none; 
            border-radius: 10px; 
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255,255,255,0.2); 
            transition: 0.3s;
        }
        .launch-btn:hover { 
            transform: scale(1.05); 
            background: #e0e0e0; 
        }
    </style>
</head>
<body>

    <button class="launch-btn" onclick="window.open('game.html', '_blank')">
        LAUNCH FULL SIMULATOR
    </button>

</body>
</html>
